<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', sans-serif; fill: #1f2937; }
      .entityTitle { font: 700 22px 'Microsoft YaHei', sans-serif; fill: #111827; }
      .field { font: 400 17px 'Microsoft YaHei', sans-serif; fill: #374151; }
      .relation { font: 700 20px 'Microsoft YaHei', sans-serif; fill: #475569; }
    </style>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="70" text-anchor="middle" class="title">系统数据库 E-R 图</text>

  <g>
    <rect x="110" y="180" rx="18" ry="18" width="340" height="260" fill="#eef6ff" stroke="#60a5fa" stroke-width="3"/>
    <text x="140" y="225" class="entityTitle">ACCOUNT</text>
    <text x="140" y="265" class="field">account_id (PK)</text>
    <text x="140" y="300" class="field">email_address</text>
    <text x="140" y="335" class="field">auth_code</text>
    <text x="140" y="370" class="field">imap_server / imap_port</text>
    <text x="140" y="405" class="field">smtp_server / smtp_port</text>
  </g>

  <g>
    <rect x="530" y="140" rx="18" ry="18" width="340" height="360" fill="#eefbf3" stroke="#4ade80" stroke-width="3"/>
    <text x="560" y="185" class="entityTitle">MAIL</text>
    <text x="560" y="225" class="field">mail_id (PK)</text>
    <text x="560" y="260" class="field">account_id (FK)</text>
    <text x="560" y="295" class="field">subject</text>
    <text x="560" y="330" class="field">sender</text>
    <text x="560" y="365" class="field">send_time</text>
    <text x="560" y="400" class="field">body</text>
    <text x="560" y="435" class="field">classify_result</text>
    <text x="560" y="470" class="field">reply_text / polish_text</text>
  </g>

  <g>
    <rect x="980" y="180" rx="18" ry="18" width="300" height="200" fill="#fff6ea" stroke="#fb923c" stroke-width="3"/>
    <text x="1010" y="225" class="entityTitle">ATTACHMENT</text>
    <text x="1010" y="265" class="field">attachment_id (PK)</text>
    <text x="1010" y="300" class="field">mail_id (FK)</text>
    <text x="1010" y="335" class="field">file_name</text>
    <text x="1010" y="370" class="field">file_path</text>
  </g>

  <g>
    <rect x="980" y="470" rx="18" ry="18" width="300" height="170" fill="#fff1f7" stroke="#f472b6" stroke-width="3"/>
    <text x="1010" y="515" class="entityTitle">LINK</text>
    <text x="1010" y="555" class="field">link_id (PK)</text>
    <text x="1010" y="590" class="field">mail_id (FK)</text>
    <text x="1010" y="625" class="field">url</text>
  </g>

  <line x1="450" y1="300" x2="530" y2="300" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>
  <text x="468" y="282" class="relation">1 : N</text>
  <text x="420" y="330" class="relation">拥有</text>

  <line x1="870" y1="285" x2="980" y2="285" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>
  <text x="895" y="266" class="relation">1 : N</text>
  <text x="900" y="317" class="relation">包含附件</text>

  <line x1="870" y1="555" x2="980" y2="555" stroke="#64748b" stroke-width="4" marker-end="url(#arrow2)"/>
  <text x="895" y="536" class="relation">1 : N</text>
  <text x="908" y="587" class="relation">包含链接</text>
</svg>
