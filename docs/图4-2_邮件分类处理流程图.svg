<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', sans-serif; fill: #1f2937; }
      .boxTitle { font: 700 22px 'Microsoft YaHei', sans-serif; fill: #111827; }
      .boxText { font: 400 18px 'Microsoft YaHei', sans-serif; fill: #374151; }
      .decision { font: 700 21px 'Microsoft YaHei', sans-serif; fill: #111827; }
    </style>
    <marker id="arrow4" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="70" text-anchor="middle" class="title">邮件分类处理流程图</text>

  <rect x="480" y="110" rx="20" ry="20" width="440" height="85" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
  <text x="700" y="155" text-anchor="middle" class="boxTitle">输入邮件主题与正文</text>
  <text x="700" y="185" text-anchor="middle" class="boxText">读取待分类邮件的主要文本内容</text>

  <rect x="480" y="240" rx="20" ry="20" width="440" height="85" fill="#ffffff" stroke="#4ade80" stroke-width="3"/>
  <text x="700" y="285" text-anchor="middle" class="boxTitle">规则预筛</text>
  <text x="700" y="315" text-anchor="middle" class="boxText">根据广告词、工作词、链接特征等进行快速判断</text>

  <polygon points="700,385 860,490 700,595 540,490" fill="#fff6ea" stroke="#fb923c" stroke-width="3"/>
  <text x="700" y="485" text-anchor="middle" class="decision">规则能否直接判定？</text>
  <text x="700" y="515" text-anchor="middle" class="boxText">是：直接输出　否：交由模型判别</text>

  <rect x="180" y="665" rx="20" ry="20" width="360" height="95" fill="#eefbf3" stroke="#4ade80" stroke-width="3"/>
  <text x="360" y="713" text-anchor="middle" class="boxTitle">输出分类结果</text>
  <text x="360" y="745" text-anchor="middle" class="boxText">正常邮件 / 垃圾邮件</text>

  <rect x="860" y="665" rx="20" ry="20" width="360" height="95" fill="#eef6ff" stroke="#60a5fa" stroke-width="3"/>
  <text x="1040" y="713" text-anchor="middle" class="boxTitle">模型语义判别</text>
  <text x="1040" y="745" text-anchor="middle" class="boxText">组织分类提示词，输出二分类结果</text>

  <line x1="700" y1="195" x2="700" y2="240" stroke="#64748b" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="700" y1="325" x2="700" y2="385" stroke="#64748b" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="620" y1="540" x2="410" y2="665" stroke="#64748b" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="780" y1="540" x2="990" y2="665" stroke="#64748b" stroke-width="4" marker-end="url(#arrow4)"/>
  <line x1="860" y1="712" x2="540" y2="712" stroke="#64748b" stroke-width="4" marker-end="url(#arrow4)"/>
  <text x="548" y="692" class="boxText">模型输出</text>
</svg>
