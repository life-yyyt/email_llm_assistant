<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .title { font: 700 34px 'Microsoft YaHei', sans-serif; fill: #1f2937; }
      .boxTitle { font: 700 22px 'Microsoft YaHei', sans-serif; fill: #111827; }
      .boxText { font: 400 18px 'Microsoft YaHei', sans-serif; fill: #374151; }
      .decision { font: 700 21px 'Microsoft YaHei', sans-serif; fill: #111827; }
    </style>
    <marker id="arrow5" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1400" height="920" fill="#f8fafc"/>
  <text x="700" y="70" text-anchor="middle" class="title">自动回复生成流程图</text>

  <rect x="470" y="110" rx="20" ry="20" width="460" height="85" fill="#ffffff" stroke="#60a5fa" stroke-width="3"/>
  <text x="700" y="155" text-anchor="middle" class="boxTitle">读取邮件主题与正文</text>
  <text x="700" y="185" text-anchor="middle" class="boxText">获取待回复邮件的主要内容</text>

  <rect x="470" y="240" rx="20" ry="20" width="460" height="85" fill="#ffffff" stroke="#4ade80" stroke-width="3"/>
  <text x="700" y="285" text-anchor="middle" class="boxTitle">正文清洗</text>
  <text x="700" y="315" text-anchor="middle" class="boxText">去除链接、邮箱地址及可能干扰模型的噪声</text>

  <rect x="470" y="370" rx="20" ry="20" width="460" height="85" fill="#ffffff" stroke="#fb923c" stroke-width="3"/>
  <text x="700" y="415" text-anchor="middle" class="boxTitle">场景识别</text>
  <text x="700" y="445" text-anchor="middle" class="boxText">识别会议确认、附件查收、催办处理、感谢支持等场景</text>

  <polygon points="700,505 860,610 700,715 540,610" fill="#fff6ea" stroke="#fb923c" stroke-width="3"/>
  <text x="700" y="605" text-anchor="middle" class="decision">规则是否可直接生成回复？</text>
  <text x="700" y="635" text-anchor="middle" class="boxText">常见场景优先规则回复，复杂场景进入模型生成</text>

  <rect x="170" y="775" rx="20" ry="20" width="400" height="90" fill="#eefbf3" stroke="#4ade80" stroke-width="3"/>
  <text x="370" y="820" text-anchor="middle" class="boxTitle">规则回复</text>
  <text x="370" y="850" text-anchor="middle" class="boxText">快速生成稳定、简洁的回复草稿</text>

  <rect x="830" y="775" rx="20" ry="20" width="400" height="90" fill="#eef6ff" stroke="#60a5fa" stroke-width="3"/>
  <text x="1030" y="820" text-anchor="middle" class="boxTitle">模型生成与输出清洗</text>
  <text x="1030" y="850" text-anchor="middle" class="boxText">Few-shot + Prompt 约束 + 去重截断处理</text>

  <line x1="700" y1="195" x2="700" y2="240" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="700" y1="325" x2="700" y2="370" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="700" y1="455" x2="700" y2="505" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="620" y1="660" x2="430" y2="775" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
  <line x1="780" y1="660" x2="970" y2="775" stroke="#64748b" stroke-width="4" marker-end="url(#arrow5)"/>
</svg>
